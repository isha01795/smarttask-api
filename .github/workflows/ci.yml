name: FastAPI CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master


jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:15

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: testdb

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/testdb
          SECRET_KEY: testsecret
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30

        run: |
          python -m pytest -v